<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>24×24 Pixel Art</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080808;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 24px;
      font-family: monospace;
    }
    #wrap {
      position: relative;
      image-rendering: pixelated;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    button {
      background: transparent;
      border: 1px solid #222;
      color: #555;
      padding: 9px 22px;
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
    }
    button:hover { border-color: #fff; color: #fff; }
    .seed-label {
      color: #2a2a2a;
      font-size: 11px;
      letter-spacing: 0.08em;
    }
    .rarity-bar {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .rarity-dot {
      width: 8px;
      height: 8px;
    }
    .rarity-label {
      color: #333;
      font-size: 10px;
      letter-spacing: 0.06em;
      margin-right: 8px;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div class="controls">
  <button onclick="generate()">New ↺</button>
  <button onclick="saveImg()">Save ↓</button>
  <span class="seed-label" id="seedLabel">#000000</span>
</div>

<div class="rarity-bar" id="rarityBar"></div>

<script>
const GRID   = 24;
const PX     = 22;   // display pixels per cell
const SIZE   = GRID * PX;

// ── COLOR TABLE ─────────────────────────────────────────────────────────────
// weight = relative frequency. Higher = more common.
// Black dominates. Each bright color is rare individually.
const COLORS = [
  // blacks / near-blacks — dominant
  { hex: '#000000', weight: 320, label: 'void' },
  { hex: '#080808', weight: 60,  label: 'void' },
  { hex: '#111111', weight: 30,  label: 'void' },
  { hex: '#0a0004', weight: 20,  label: 'void' },
  { hex: '#00040a', weight: 20,  label: 'void' },

  // muted dark accents — uncommon
  { hex: '#1a0a00', weight: 12,  label: 'coal' },
  { hex: '#0a0012', weight: 12,  label: 'coal' },
  { hex: '#001209', weight: 10,  label: 'coal' },

  // mid tones — scarce
  { hex: '#2a2a2a', weight: 8,   label: 'grey' },
  { hex: '#1f1f1f', weight: 6,   label: 'grey' },

  // LOUD accent colors — rare
  { hex: '#FF003C', weight: 5,   label: 'signal' },  // blood red
  { hex: '#FF6600', weight: 4,   label: 'signal' },  // hot orange
  { hex: '#FFE000', weight: 4,   label: 'signal' },  // electric yellow
  { hex: '#00FF41', weight: 3,   label: 'signal' },  // matrix green
  { hex: '#00CFFF', weight: 3,   label: 'signal' },  // ice blue
  { hex: '#FF2EF5', weight: 3,   label: 'signal' },  // hot pink
  { hex: '#7B2FFF', weight: 3,   label: 'signal' },  // deep violet
  { hex: '#FF0066', weight: 2,   label: 'signal' },  // neon rose
  { hex: '#00FFD1', weight: 2,   label: 'signal' },  // mint

  // ultra-rare — white / near-white
  { hex: '#FFFFFF', weight: 1,   label: 'ghost' },
  { hex: '#F0F0F0', weight: 1,   label: 'ghost' },
];

// Build weighted lookup array
const pool = [];
COLORS.forEach(c => {
  for (let i = 0; i < c.weight; i++) pool.push(c.hex);
});
const TOTAL_WEIGHT = pool.length;

const cv  = document.getElementById('c');
const ctx = cv.getContext('2d');
cv.width  = SIZE;
cv.height = SIZE;

// Crisp pixels
ctx.imageSmoothingEnabled = false;

let currentSeed;

function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function generate() {
  currentSeed = Math.random() * 0xFFFFFFFF | 0;
  draw(currentSeed);
}

function draw(seed) {
  const rnd = mulberry32(seed);
  const counts = {};

  ctx.clearRect(0, 0, SIZE, SIZE);

  for (let row = 0; row < GRID; row++) {
    for (let col = 0; col < GRID; col++) {
      const hex = pool[Math.floor(rnd() * TOTAL_WEIGHT)];
      ctx.fillStyle = hex;
      ctx.fillRect(col * PX, row * PX, PX, PX);
      counts[hex] = (counts[hex] || 0) + 1;
    }
  }

  // Seed label
  const hexSeed = '#' + (seed >>> 0).toString(16).toUpperCase().padStart(8, '0');
  document.getElementById('seedLabel').textContent = hexSeed;

  // Rarity bar — which accent colors appeared
  const bar = document.getElementById('rarityBar');
  bar.innerHTML = '';
  const accents = COLORS.filter(c => c.label === 'signal' || c.label === 'ghost');
  accents.forEach(c => {
    if (counts[c.hex]) {
      const dot = document.createElement('div');
      dot.className = 'rarity-dot';
      dot.style.background = c.hex;
      dot.title = `${c.hex} × ${counts[c.hex]}`;
      bar.appendChild(dot);
    }
  });
}

function saveImg() {
  // Save at 4x resolution
  const big = document.createElement('canvas');
  big.width = big.height = SIZE * 4;
  const bx = big.getContext('2d');
  bx.imageSmoothingEnabled = false;
  bx.drawImage(cv, 0, 0, SIZE * 4, SIZE * 4);
  const a = document.createElement('a');
  a.download = `pixel-${currentSeed}.png`;
  a.href = big.toDataURL();
  a.click();
}

generate();
</script>
</body>
</html>
