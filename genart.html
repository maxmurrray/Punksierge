<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Your Aura</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050505;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      gap: 28px;
    }

    .title {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: #333;
      text-transform: uppercase;
      font-weight: 400;
    }

    .canvas-wrap {
      position: relative;
      border-radius: 50%;
      overflow: hidden;
    }

    canvas {
      display: block;
      border-radius: 50%;
    }

    .aura-name {
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      text-align: center;
      min-height: 28px;
      transition: opacity 0.4s;
    }

    .input-wrap {
      display: flex;
      gap: 0;
      width: 100%;
      max-width: 340px;
    }

    input {
      flex: 1;
      background: transparent;
      border: 1px solid #1c1c1c;
      border-right: none;
      color: #fff;
      padding: 13px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      outline: none;
      transition: border-color 0.2s;
    }

    input::placeholder { color: #2a2a2a; }
    input:focus { border-color: #333; }

    button.gen-btn {
      background: #fff;
      border: 1px solid #fff;
      color: #000;
      padding: 13px 22px;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      font-weight: 500;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    button.gen-btn:hover { opacity: 0.85; }

    .actions {
      display: flex;
      gap: 10px;
    }

    button.sec {
      background: transparent;
      border: 1px solid #1c1c1c;
      color: #444;
      padding: 9px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    button.sec:hover { border-color: #555; color: #888; }

    .desc {
      font-size: 0.7rem;
      color: #222;
      letter-spacing: 0.08em;
      text-align: center;
      max-width: 280px;
      line-height: 1.7;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="title">Your Aura</div>

<div class="canvas-wrap" id="wrap">
  <canvas id="c"></canvas>
</div>

<div class="aura-name" id="nameLabel"></div>

<div class="input-wrap">
  <input type="text" id="nameInput" placeholder="Enter your name..." maxlength="40" autocomplete="off" autocorrect="off" spellcheck="false">
  <button class="gen-btn" onclick="generateFromInput()">Read it</button>
</div>

<div class="actions">
  <button class="sec" onclick="randomize()">Random ↺</button>
  <button class="sec" onclick="saveImg()">Save ↓</button>
</div>

<div class="desc">No two auras are the same.<br>Yours is determined by your name.</div>

<script>
const SIZE = 480;
const cv   = document.getElementById('c');
const ctx  = cv.getContext('2d');
cv.width = cv.height = SIZE;

// ── Hash string → deterministic seed ───────────────────────
function hashStr(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

// ── Seeded PRNG ─────────────────────────────────────────────
function mkRng(seed) {
  let s = seed;
  return {
    f: function() {
      s = (s ^ (s << 13)) >>> 0;
      s = (s ^ (s >>> 17)) >>> 0;
      s = (s ^ (s << 5))  >>> 0;
      return s / 0xFFFFFFFF;
    },
    range: function(a, b) { return a + this.f() * (b - a); },
    pick:  function(arr)  { return arr[Math.floor(this.f() * arr.length)]; },
  };
}

// ── Color palettes ───────────────────────────────────────────
const PALETTE_SETS = [
  // Electric
  ['#FF2EF5','#7B2FFF','#00CFFF','#FF003C'],
  // Fire
  ['#FF4500','#FFD700','#FF6600','#FF0066'],
  // Ocean
  ['#00CFFF','#0066FF','#00FFD1','#7B2FFF'],
  // Rose
  ['#FF6EC7','#FF2EF5','#CE93D8','#F48FB1'],
  // Lime
  ['#00FF41','#ADFF2F','#00FFD1','#7FFF00'],
  // Gold
  ['#FFD700','#FFA500','#FF8C00','#FFEC8B'],
  // Ice
  ['#A8D8EA','#E0F4FC','#00CFFF','#7EB8D4'],
  // Infrared
  ['#FF003C','#FF2EF5','#FF6600','#7B2FFF'],
  // Void
  ['#7B2FFF','#00CFFF','#FF2EF5','#FFFFFF'],
  // Ember
  ['#FF4500','#FF003C','#FFD700','#FF6EC7'],
];

// ── Perlin-like smooth noise ─────────────────────────────────
function smoothNoise(rng) {
  const size = 64;
  const n = [];
  for (let i = 0; i <= size; i++) {
    n[i] = [];
    for (let j = 0; j <= size; j++) n[i][j] = rng.f();
  }
  return function(x, y) {
    const xi = Math.floor(x) % size;
    const yi = Math.floor(y) % size;
    const xf = x - Math.floor(x);
    const yf = y - Math.floor(y);
    const fade = t => t * t * t * (t * (t * 6 - 15) + 10);
    const lerp  = (a, b, t) => a + (b - a) * t;
    return lerp(
      lerp(n[xi][yi], n[(xi+1)%size][yi], fade(xf)),
      lerp(n[xi][(yi+1)%size], n[(xi+1)%size][(yi+1)%size], fade(xf)),
      fade(yf)
    );
  };
}

// ── Main draw ────────────────────────────────────────────────
let currentName = '';

function draw(name) {
  currentName = name;
  const seed = hashStr(name.toLowerCase().trim() || String(Math.random()));
  const rng  = mkRng(seed);

  // Pick palette based on seed
  const pal   = PALETTE_SETS[Math.floor(rng.f() * PALETTE_SETS.length)];
  const noise = smoothNoise(rng);

  // Clear
  ctx.clearRect(0, 0, SIZE, SIZE);
  ctx.fillStyle = '#060606';
  ctx.fillRect(0, 0, SIZE, SIZE);

  const cx = SIZE / 2;
  const cy = SIZE / 2;

  // ── Layer 1: base glow blobs ─────────────────────────────
  const numBlobs = 5 + Math.floor(rng.f() * 4);
  for (let b = 0; b < numBlobs; b++) {
    const color  = pal[Math.floor(rng.f() * pal.length)];
    const radius = rng.range(SIZE * 0.18, SIZE * 0.46);
    const bx     = cx + rng.range(-SIZE * 0.22, SIZE * 0.22);
    const by     = cy + rng.range(-SIZE * 0.22, SIZE * 0.22);
    const alpha  = rng.range(0.08, 0.22);

    const grad = ctx.createRadialGradient(bx, by, 0, bx, by, radius);
    grad.addColorStop(0, hexAlpha(color, alpha));
    grad.addColorStop(1, hexAlpha(color, 0));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(bx, by, radius, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── Layer 2: noise-warped rings ──────────────────────────
  const rings = 3 + Math.floor(rng.f() * 3);
  for (let r = 0; r < rings; r++) {
    const color  = pal[Math.floor(rng.f() * pal.length)];
    const baseR  = rng.range(SIZE * 0.12, SIZE * 0.42);
    const alpha  = rng.range(0.06, 0.18);
    const nScale = rng.range(0.04, 0.12);
    const warp   = rng.range(0.06, 0.22);
    const pts    = 360;

    ctx.beginPath();
    for (let a = 0; a <= pts; a++) {
      const angle = (a / pts) * Math.PI * 2;
      const nx    = Math.cos(angle) * nScale + r * 0.5;
      const ny    = Math.sin(angle) * nScale + r * 0.5;
      const n     = noise(nx * 8, ny * 8);
      const rad   = baseR * (1 + (n - 0.5) * warp * 2);
      const px    = cx + Math.cos(angle) * rad;
      const py    = cy + Math.sin(angle) * rad;
      a === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.strokeStyle = hexAlpha(color, alpha);
    ctx.lineWidth = rng.range(1.5, 5);
    ctx.stroke();
  }

  // ── Layer 3: inner bright core ───────────────────────────
  const coreColor = pal[Math.floor(rng.f() * pal.length)];
  const coreR     = SIZE * rng.range(0.05, 0.14);
  const coreGrad  = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR);
  coreGrad.addColorStop(0, hexAlpha('#ffffff', rng.range(0.35, 0.65)));
  coreGrad.addColorStop(0.4, hexAlpha(coreColor, rng.range(0.2, 0.5)));
  coreGrad.addColorStop(1, hexAlpha(coreColor, 0));
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, coreR * 2.5, 0, Math.PI * 2);
  ctx.fill();

  // ── Layer 4: scattered particles ────────────────────────
  const particles = 60 + Math.floor(rng.f() * 80);
  for (let p = 0; p < particles; p++) {
    const angle  = rng.f() * Math.PI * 2;
    const dist   = rng.range(SIZE * 0.05, SIZE * 0.44);
    const px     = cx + Math.cos(angle) * dist;
    const py     = cy + Math.sin(angle) * dist;
    const psize  = rng.range(0.8, 3.5);
    const color  = rng.f() < 0.3 ? '#ffffff' : pal[Math.floor(rng.f() * pal.length)];
    const alpha  = rng.range(0.1, 0.55);

    ctx.beginPath();
    ctx.arc(px, py, psize, 0, Math.PI * 2);
    ctx.fillStyle = hexAlpha(color, alpha);
    ctx.fill();
  }

  // ── Layer 5: radial vignette ─────────────────────────────
  const vig = ctx.createRadialGradient(cx, cy, SIZE * 0.25, cx, cy, SIZE * 0.5);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(6,6,6,0.72)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, SIZE, SIZE);

  // Clip to circle
  ctx.globalCompositeOperation = 'destination-in';
  ctx.beginPath();
  ctx.arc(cx, cy, SIZE / 2, 0, Math.PI * 2);
  ctx.fillStyle = '#000';
  ctx.fill();
  ctx.globalCompositeOperation = 'source-over';

  document.getElementById('nameLabel').textContent = name.trim() || '';
}

function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

function generateFromInput() {
  const val = document.getElementById('nameInput').value.trim();
  if (!val) return;
  draw(val);
}

function randomize() {
  const names = ['Cosmic','Ether','Solstice','Vapor','Abyss','Prism','Nocturne','Eclipse','Flux','Reverie','Nova','Cipher'];
  const n = names[Math.floor(Math.random() * names.length)] + Math.floor(Math.random() * 999);
  document.getElementById('nameInput').value = '';
  draw(n);
}

function saveImg() {
  const a = document.createElement('a');
  a.download = `aura-${currentName || 'unknown'}.png`;
  a.href = cv.toDataURL('image/png');
  a.click();
}

// Enter key
document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') generateFromInput();
});

// Start with random
randomize();
</script>
</body>
</html>
