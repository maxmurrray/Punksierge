<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>SIGNAL LOST</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 18px;
      font-family: monospace;
      overflow: hidden;
    }
    canvas { display: block; image-rendering: pixelated; cursor: pointer; }
    .meta {
      display: flex;
      gap: 18px;
      align-items: center;
    }
    .tag {
      font-size: 9px;
      letter-spacing: 0.2em;
      color: #1a1a1a;
      text-transform: uppercase;
    }
    .tag.live { color: #FF003C; animation: blink 1.1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    button {
      background: none;
      border: 1px solid #1a1a1a;
      color: #333;
      padding: 7px 16px;
      font-family: monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.1s;
    }
    button:hover { border-color: #FF003C; color: #FF003C; }
  </style>
</head>
<body>

<canvas id="c"></canvas>
<div class="meta">
  <span class="tag live">● LIVE</span>
  <span class="tag" id="frameTag">FRAME 0000</span>
  <button onclick="newSeed()">NEW ↺</button>
  <button onclick="saveFrame()">SAVE ↓</button>
</div>

<script>
const W = 480, H = 480;
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
cv.width = W; cv.height = H;

// ── PALETTE — XCOPY: black + neon + bone ─────────────────────
const BLACK  = [0,   0,   0  ];
const VOID   = [5,   0,   2  ];
const RED    = [255, 0,   40 ];
const GREEN  = [0,   255, 60 ];
const CYAN   = [0,   220, 255];
const WHITE  = [240, 235, 220];
const DIM    = [18,  18,  18 ];

// Palette weights for each "mode"
const PALETTES = [
  { name:'DECAY',  bg: VOID,  a: RED,   b: [255,60,0],  c: WHITE },
  { name:'MATRIX', bg: BLACK, a: GREEN, b: [0,180,40],  c: WHITE },
  { name:'STATIC', bg: BLACK, a: WHITE, b: [180,180,180], c: RED },
  { name:'VOID',   bg: VOID,  a: CYAN,  b: RED,         c: WHITE },
];

let palIdx = 0;
let pal = PALETTES[0];
let frameCount = 0;
let seed = Math.random() * 99999 | 0;
let noiseField = [];
let glitchIntensity = 0;
let invertTimer = 0;
let rgbTimer = 0;

// ── SEEDED PRNG ────────────────────────────────────────────
let _s;
function srand(s){ _s = s; }
function rnd(){
  _s ^= _s << 13; _s ^= _s >> 17; _s ^= _s << 5;
  return (_s >>> 0) / 0xffffffff;
}
function rng(a,b){ return a + rnd()*(b-a); }
function ri(a,b){ return Math.floor(rng(a,b+1)); }

// ── NOISE TABLE ────────────────────────────────────────────
function buildNoise(s) {
  srand(s);
  noiseField = new Float32Array(W * H);
  for (let i = 0; i < noiseField.length; i++) noiseField[i] = rnd();
}

// ── SMOOTH NOISE (bilinear on grid) ─────────────────────────
function snoise(x, y, scale) {
  const gx = x / scale;
  const gy = y / scale;
  const xi = Math.floor(gx) & 255;
  const yi = Math.floor(gy) & 255;
  const xf = gx - Math.floor(gx);
  const yf = gy - Math.floor(gy);
  const lerp = (a,b,t) => a+(b-a)*t;
  const fade = t => t*t*(3-2*t);
  const g = (cx,cy) => noiseField[((cx & 255) + (cy & 255) * 256) % noiseField.length];
  return lerp(
    lerp(g(xi,yi), g(xi+1,yi), fade(xf)),
    lerp(g(xi,yi+1), g(xi+1,yi+1), fade(xf)),
    fade(yf)
  );
}

// ── FIGURE: procedural skull/figure shape ───────────────────
function figureAlpha(x, y, t) {
  const cx = W * 0.5, cy = H * 0.46;
  const dx = (x - cx) / (W * 0.28);
  const dy = (y - cy) / (H * 0.32);

  // Base ellipse (head)
  const head = 1.0 - Math.sqrt(dx*dx + dy*dy);

  // Eye sockets — two dark voids
  const ex1 = (x - cx*0.72) / (W*0.07);
  const ey1 = (y - cy*0.85) / (H*0.06);
  const eye1 = Math.sqrt(ex1*ex1 + ey1*ey1);

  const ex2 = (x - cx*1.28) / (W*0.07);
  const ey2 = (y - cy*0.85) / (H*0.06);
  const eye2 = Math.sqrt(ex2*ex2 + ey2*ey2);

  // Jaw / lower face
  const jdx = (x - cx) / (W * 0.24);
  const jdy = (y - (cy + H*0.16)) / (H * 0.16);
  const jaw = 1.0 - Math.sqrt(jdx*jdx + jdy*jdy*0.6);

  // Neck
  const ndx = (x - cx) / (W * 0.07);
  const ndy = (y - (cy + H*0.3)) / (H * 0.09);
  const neck = 1.0 - Math.sqrt(ndx*ndx + ndy*ndy);

  // Noise warp (breathes/corrupts over time)
  const warp = snoise(x, y + t * 12, 60) * 0.4 - 0.2;

  const form = Math.max(head, jaw*0.7, neck*0.5) + warp;
  const eyes = Math.min(eye1, eye2);

  // Hollow eye sockets
  if (eyes < 0.8 && form > 0.1) return -0.5;
  return form;
}

// ── DITHER ───────────────────────────────────────────────────
const BAYER4 = [
   0,  8,  2, 10,
  12,  4, 14,  6,
   3, 11,  1,  9,
  15,  7, 13,  5
];
function bayerThresh(x, y) {
  return BAYER4[(x&3) + (y&3)*4] / 16.0;
}

// ── DRAW FRAME ───────────────────────────────────────────────
function drawFrame() {
  frameCount++;
  document.getElementById('frameTag').textContent =
    'FRAME ' + String(frameCount).padStart(4,'0');

  srand((seed + frameCount * 7919) | 0);

  const t = frameCount / 24.0;
  const idata = ctx.createImageData(W, H);
  const d = idata.data;

  // Glitch probability spikes
  if (rnd() < 0.06) glitchIntensity = rng(0.3, 1.0);
  else glitchIntensity *= 0.82;

  if (rnd() < 0.04) invertTimer = ri(1, 4);
  if (invertTimer > 0) invertTimer--;

  if (rnd() < 0.07) rgbTimer = ri(1, 5);
  if (rgbTimer > 0) rgbTimer--;

  // ── Horizontal tear offsets ────────────────────────────
  const tears = [];
  const numTears = glitchIntensity > 0.4 ? ri(2, 8) : ri(0, 2);
  for (let i = 0; i < numTears; i++) {
    tears.push({
      y: ri(0, H),
      h: ri(1, 12),
      dx: ri(-30, 30) * glitchIntensity,
    });
  }
  function tearOffset(y) {
    for (let t of tears) if (y >= t.y && y < t.y + t.h) return t.dx;
    return 0;
  }

  // ── Render pixels ─────────────────────────────────────
  for (let y = 0; y < H; y++) {
    const tx = tearOffset(y) | 0;
    for (let x = 0; x < W; x++) {
      const sx = ((x + tx) % W + W) % W;
      const i  = (y * W + x) * 4;

      // Figure value
      const fv = figureAlpha(sx, y, t);
      const noise = snoise(sx, y, 18) * 0.35;
      const grain = rnd() * 0.12;
      const val = fv + noise + grain;

      // Bayer dither threshold
      const thresh  = bayerThresh(x, y);
      const thresh2 = bayerThresh((x+2)&3, (y+1)&3);

      let col;
      if (val > 0.65 + thresh * 0.15) {
        col = pal.c;                          // bright
      } else if (val > 0.3 + thresh * 0.2) {
        col = rnd() < 0.7 ? pal.a : pal.b;  // mid tone
      } else if (val > 0.05 + thresh2 * 0.15) {
        col = rnd() < 0.15 ? pal.b : DIM;   // dark dithered
      } else {
        col = rnd() < 0.03 ? pal.a : pal.bg; // background
      }

      // RGB split glitch
      let r = col[0], g = col[1], b = col[2];
      if (rgbTimer > 0 && rnd() < 0.5) {
        const shift = ri(2, 18);
        const si = (y * W + Math.min(x + shift, W-1)) * 4;
        r = col[0];
        g = col[1];
        b = col[2];
        // channel offset — crude but effective
        if (x + shift < W) {
          const adj = d[(y * W + x - 1) * 4] || col[0];
          r = (r + adj) >> 1;
        }
      }

      // Scan lines (every other row dimmed)
      if (y % 2 === 0 && rnd() < 0.3) {
        r = (r * 0.55) | 0;
        g = (g * 0.55) | 0;
        b = (b * 0.55) | 0;
      }

      // Invert flash
      if (invertTimer > 0) { r = 255-r; g = 255-g; b = 255-b; }

      // Dead pixels flicker
      if (rnd() < 0.0008) { r = 255; g = 0; b = 40; }

      d[i]   = r;
      d[i+1] = g;
      d[i+2] = b;
      d[i+3] = 255;
    }
  }

  ctx.putImageData(idata, 0, 0);

  // ── Scanline overlay ────────────────────────────────
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  for (let y = 0; y < H; y += 2) {
    ctx.fillRect(0, y, W, 1);
  }

  // ── Occasional full-width glitch bar ────────────────
  if (glitchIntensity > 0.6 && rnd() < 0.3) {
    const gy = ri(0, H-20);
    const gh = ri(2, 18);
    const [r,g,b] = rnd() < 0.5 ? pal.a : pal.b;
    ctx.fillStyle = `rgba(${r},${g},${b},${rng(0.3,0.7)})`;
    ctx.fillRect(0, gy, W, gh);
  }
}

// ── CONTROLS ─────────────────────────────────────────────────
function newSeed() {
  seed = Math.random() * 99999 | 0;
  palIdx = (palIdx + 1) % PALETTES.length;
  pal = PALETTES[palIdx];
  frameCount = 0;
  buildNoise(seed);
}

function saveFrame() {
  const a = document.createElement('a');
  a.download = `xcopy-style-${seed}-${frameCount}.png`;
  a.href = cv.toDataURL();
  a.click();
}

// ── INIT + LOOP ───────────────────────────────────────────────
buildNoise(seed);

// ~10fps — choppy like a GIF, not smooth
let last = 0;
const FPS = 10;
function loop(ts) {
  if (ts - last >= 1000/FPS) {
    last = ts;
    drawFrame();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
