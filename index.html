<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punksierge</title>
    <link rel="stylesheet" href="https://use.typekit.net/iyz5ted.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <svg class="logo-icon" viewBox="0 0 7 7" width="32" height="32" fill="#DE4097">
                <rect x="0" y="0" width="2" height="2"/>
                <rect x="2.5" y="2.5" width="2" height="2"/>
                <rect x="5" y="5" width="2" height="2"/>
            </svg>
            <span class="logo-text">Punksierge</span>
        </div>
        <nav>
            <a href="#">About Us</a>
            <a href="#">Contact Us</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Want To Buy a CryptoPunk?</h1>
            <p>We'll help you make the right move.</p>
        </section>

        <section class="cards">
            <div class="card">
                <div class="card-images two-punks">
                    <img src="cryptopunk-1021.png" alt="CryptoPunk 1021">
                    <img src="cryptopunk-3355.png" alt="CryptoPunk 3355">
                </div>
                <div class="card-content">
                    <h3>Punk Valuation Advice</h3>
                    <p>Learn which punks are valuable. What traits sell.</p>
                </div>
            </div>

            <div class="card">
                <div class="card-images single-punk">
                    <img src="cryptopunk-6058.png" alt="CryptoPunk 6058">
                </div>
                <div class="card-content">
                    <h3>Exclusive Connections</h3>
                    <p>Access off-market Punks through our network.</p>
                </div>
            </div>

            <div class="card">
                <div class="card-images magnifier">
                    <img src="SVG/Magnifying glass.svg" alt="Magnifying Glass">
                </div>
                <div class="card-content">
                    <h3>Punk Insights</h3>
                    <p>All your questions about Punks answered.</p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
