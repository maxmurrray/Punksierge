<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PunkPick — Pick Your Punk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,400;0,600;0,700;1,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Chakra Petch', monospace;
      min-height: 100vh;
    }

    header {
      padding: 18px 40px;
      border-bottom: 1px solid #1c1c1c;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1rem;
      font-weight: 700;
      font-style: italic;
      color: #DE4097;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .round-badge {
      font-size: 0.72rem;
      color: #444;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .round-badge span { color: #888; }

    .lb-trigger {
      background: transparent;
      border: 1px solid #222;
      color: #555;
      padding: 8px 18px;
      font-family: inherit;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .lb-trigger:hover {
      border-color: #DE4097;
      color: #DE4097;
    }

    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px 48px;
    }

    .prompt {
      text-align: center;
      margin-bottom: 24px;
    }

    .prompt h1 {
      font-size: 1.2rem;
      font-weight: 700;
      font-style: italic;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .prompt p {
      color: #333;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── GRID ── */
    .punk-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 24px;
    }

    .punk-card {
      /* Classic CryptoPunks blue-grey background */
      background: #638596;
      border: 3px solid transparent;
      cursor: pointer;
      transition: border-color 0.12s, opacity 0.15s, transform 0.12s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 8px 6px;
      position: relative;
      user-select: none;
      aspect-ratio: 1;
    }

    .punk-card:hover {
      border-color: rgba(255,255,255,0.25);
      transform: translateY(-2px);
    }

    .punk-card.selected {
      border-color: #DE4097;
      box-shadow: 0 0 0 1px #DE4097;
    }

    .punk-card.selected::after {
      content: '✓';
      position: absolute;
      top: 5px;
      right: 7px;
      color: #DE4097;
      font-size: 0.75rem;
      font-weight: 700;
      background: rgba(0,0,0,0.7);
      border-radius: 0;
      padding: 1px 3px;
      line-height: 1;
    }

    .punk-card.dimmed { opacity: 0.28; }

    .punk-img {
      width: 100%;
      max-width: 110px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }

    .punk-num {
      font-size: 0.58rem;
      color: rgba(0,0,0,0.45);
      margin-top: 5px;
      letter-spacing: 0.04em;
      font-weight: 600;
    }

    .punk-card.selected .punk-num { color: #DE4097; }

    /* ── ACTIONS ── */
    .actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-next {
      background: #DE4097;
      color: #fff;
      border: none;
      padding: 13px 44px;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .btn-next.visible { opacity: 1; pointer-events: all; }
    .btn-next:hover { opacity: 0.85; }

    .btn-skip {
      background: transparent;
      border: 1px solid #1e1e1e;
      color: #333;
      padding: 13px 28px;
      font-family: inherit;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-skip:hover { border-color: #333; color: #555; }

    /* ── LEADERBOARD OVERLAY ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.93);
      z-index: 200;
      overflow-y: auto;
    }

    .overlay.open { display: block; }

    .overlay-inner {
      max-width: 580px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    .overlay-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .overlay-title {
      font-size: 1rem;
      font-weight: 700;
      font-style: italic;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .overlay-sub {
      font-size: 0.65rem;
      color: #333;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .overlay-close {
      background: none;
      border: none;
      color: #444;
      font-size: 1.3rem;
      cursor: pointer;
      line-height: 1;
      font-family: inherit;
    }

    .overlay-close:hover { color: #fff; }

    .lb-list { list-style: none; }

    .lb-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 0;
      border-bottom: 1px solid #141414;
    }

    .lb-rank {
      font-size: 0.68rem;
      color: #333;
      width: 22px;
      text-align: right;
      flex-shrink: 0;
    }

    .lb-img-wrap {
      width: 56px;
      height: 56px;
      background: #638596;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lb-img {
      width: 100%;
      image-rendering: pixelated;
    }

    .lb-meta { flex: 1; }

    .lb-name {
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .lb-count {
      font-size: 0.62rem;
      color: #444;
      margin-top: 3px;
      letter-spacing: 0.04em;
    }

    .lb-bar-bg {
      width: 80px;
      height: 2px;
      background: #1a1a1a;
      flex-shrink: 0;
    }

    .lb-bar-fill {
      height: 100%;
      background: #DE4097;
      transition: width 0.4s;
    }

    .lb-empty {
      text-align: center;
      color: #2a2a2a;
      font-size: 0.78rem;
      padding: 64px 0;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* loading spinner */
    .lb-loading {
      text-align: center;
      color: #333;
      font-size: 0.72rem;
      padding: 48px 0;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #DE4097;
      color: #fff;
      padding: 10px 24px;
      font-family: 'Chakra Petch', monospace;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      z-index: 300;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 700px) {
      .punk-grid { grid-template-columns: repeat(4, 1fr); }
      header { padding: 14px 16px; }
      .main { padding: 20px 12px 40px; }
    }

    @media (max-width: 500px) {
      .punk-grid { grid-template-columns: repeat(4, 1fr); gap: 5px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">PunkPick</div>
  <div class="round-badge">Round <span id="roundNum">1</span></div>
  <button class="lb-trigger" onclick="openLeaderboard()">🏆 Leaderboard</button>
</header>

<main class="main">
  <div class="prompt">
    <h1>Pick Your Favorite Punk</h1>
    <p>Choose one · the community is watching</p>
  </div>

  <div class="punk-grid" id="punkGrid"></div>

  <div class="actions">
    <button class="btn-skip" onclick="nextRound(false)">Skip →</button>
    <button class="btn-next" id="btnNext" onclick="nextRound(true)">Lock It In →</button>
  </div>
</main>

<div class="overlay" id="overlay">
  <div class="overlay-inner">
    <div class="overlay-hdr">
      <div>
        <div class="overlay-title">Most Liked Punks</div>
        <div class="overlay-sub">Community rankings · all votes combined</div>
      </div>
      <button class="overlay-close" onclick="closeLeaderboard()">✕</button>
    </div>
    <ul class="lb-list" id="lbList"><div class="lb-loading">Loading...</div></ul>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const TOTAL = 10000;
  const PER_ROUND = 20;
  const API = '/api/likes';

  let round = 1;
  let selected = null; // always stored as String or null

  // ── helpers ──
  function imgUrl(id) {
    return `https://www.larvalabs.com/public/images/cryptopunks/punk${String(id).padStart(4,'0')}.png`;
  }

  function randomPunks(n) {
    const s = new Set();
    while (s.size < n) s.add(Math.floor(Math.random() * TOTAL));
    return [...s];
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  // ── shared likes API (falls back to localStorage) ──
  async function fetchLikes() {
    try {
      const r = await fetch(API);
      if (!r.ok) throw new Error('api error');
      const d = await r.json();
      return d.likes || {};
    } catch {
      return JSON.parse(localStorage.getItem('pp_likes') || '{}');
    }
  }

  async function submitLike(id) {
    // Optimistic local save
    const local = JSON.parse(localStorage.getItem('pp_likes') || '{}');
    local[String(id)] = (local[String(id)] || 0) + 1;
    localStorage.setItem('pp_likes', JSON.stringify(local));

    // Send to shared API
    try {
      await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id }),
      });
    } catch {
      // silently continue — local save already done
    }
  }

  // ── grid ──
  function renderGrid() {
    selected = null;
    document.getElementById('btnNext').classList.remove('visible');
    document.getElementById('roundNum').textContent = round;

    const ids = randomPunks(PER_ROUND);
    const grid = document.getElementById('punkGrid');
    grid.innerHTML = '';

    ids.forEach(id => {
      const card = document.createElement('div');
      card.className = 'punk-card';
      card.dataset.id = id;
      card.innerHTML = `
        <img class="punk-img" src="${imgUrl(id)}" alt="Punk #${id}" loading="lazy">
        <div class="punk-num">#${id}</div>
      `;
      card.addEventListener('click', () => pick(id, card));
      grid.appendChild(card);
    });
  }

  function pick(id, card) {
    const sid = String(id);
    // Tap selected punk again → unselect
    if (selected === sid) {
      document.querySelectorAll('.punk-card').forEach(c => c.classList.remove('selected', 'dimmed'));
      selected = null;
      document.getElementById('btnNext').classList.remove('visible');
      return;
    }
    // Select this punk
    document.querySelectorAll('.punk-card').forEach(c => {
      c.classList.remove('selected', 'dimmed');
      if (c !== card) c.classList.add('dimmed');
    });
    card.classList.add('selected');
    card.classList.remove('dimmed');
    selected = sid;
    document.getElementById('btnNext').classList.add('visible');
  }

  async function nextRound(save) {
    if (save && selected !== null) {
      submitLike(selected);
      showToast(`Punk #${selected} liked ❤`);
    }
    round++;
    renderGrid();
  }

  // ── leaderboard ──
  async function openLeaderboard() {
    document.getElementById('overlay').classList.add('open');
    document.getElementById('lbList').innerHTML = '<div class="lb-loading">Loading community rankings...</div>';

    const likes = await fetchLikes();
    const sorted = Object.entries(likes).sort((a,b)=>b[1]-a[1]).slice(0,25);
    const list = document.getElementById('lbList');

    if (!sorted.length) {
      list.innerHTML = '<div class="lb-empty">No likes yet — start picking</div>';
    } else {
      const max = sorted[0][1];
      list.innerHTML = sorted.map(([id, ct], i) => `
        <li class="lb-row">
          <div class="lb-rank">${i+1}</div>
          <div class="lb-img-wrap">
            <img class="lb-img" src="${imgUrl(id)}" alt="Punk #${id}">
          </div>
          <div class="lb-meta">
            <div class="lb-name">Punk #${id}</div>
            <div class="lb-count">${ct} like${ct!==1?'s':''}</div>
          </div>
          <div class="lb-bar-bg">
            <div class="lb-bar-fill" style="width:${Math.round((ct/max)*100)}%"></div>
          </div>
        </li>
      `).join('');
    }
  }

  function closeLeaderboard() {
    document.getElementById('overlay').classList.remove('open');
  }

  renderGrid();
</script>
</body>
</html>
