<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PunkPick — Pick Your Punk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,400;0,600;0,700;1,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      overflow-x: hidden;
      width: 100%;
    }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Chakra Petch', monospace;
      min-height: 100vh;
    }

    header {
      padding: 14px 16px;
      border-bottom: 1px solid #1c1c1c;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .logo {
      font-size: 1rem;
      font-weight: 700;
      font-style: italic;
      color: #DE4097;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .round-badge {
      font-size: 0.72rem;
      color: #444;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .round-badge span { color: #888; }

    .lb-trigger {
      background: transparent;
      border: 1px solid #222;
      color: #555;
      padding: 8px 18px;
      font-family: inherit;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .lb-trigger:hover { border-color: #DE4097; color: #DE4097; }

    .main {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .prompt {
      text-align: center;
      margin-bottom: 24px;
    }

    .prompt h1 {
      font-size: 1.2rem;
      font-weight: 700;
      font-style: italic;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .prompt p {
      color: #333;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── GRID ── */
    .punk-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 24px;
    }

    .punk-card {
      background: #638596;
      border: 3px solid transparent;
      cursor: pointer;
      transition: border-color 0.12s, opacity 0.15s, transform 0.12s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 8px 6px;
      position: relative;
      user-select: none;
      aspect-ratio: 1;
      -webkit-tap-highlight-color: transparent;
    }

    .punk-card:hover { border-color: rgba(255,255,255,0.25); transform: translateY(-2px); }

    .punk-card.selected {
      border-color: #DE4097;
      box-shadow: 0 0 0 1px #DE4097;
    }

    .punk-card.selected::after {
      content: '✓';
      position: absolute;
      top: 5px;
      right: 7px;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      background: #DE4097;
      padding: 1px 4px;
      line-height: 1;
    }

    .punk-card.dimmed { opacity: 0.28; }

    .punk-img {
      width: 100%;
      max-width: 110px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }

    .punk-num {
      font-size: 0.58rem;
      color: rgba(0,0,0,0.45);
      margin-top: 5px;
      letter-spacing: 0.04em;
      font-weight: 600;
    }

    .punk-card.selected .punk-num { color: #DE4097; }

    /* ── ACTIONS ── */
    .actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 48px;
    }

    .btn-next {
      background: #DE4097;
      color: #fff;
      border: none;
      padding: 14px 48px;
      font-family: 'Chakra Petch', monospace;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      display: none;
    }

    .btn-next:active { opacity: 0.8; }

    .btn-skip {
      background: transparent;
      border: 1px solid #1e1e1e;
      color: #333;
      padding: 14px 28px;
      font-family: 'Chakra Petch', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-skip:hover { border-color: #333; color: #555; }

    /* ── LEADERBOARD OVERLAY ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.93);
      z-index: 200;
      overflow-y: auto;
    }

    .overlay.open { display: block; }

    .overlay-inner {
      max-width: 580px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    .overlay-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .overlay-title {
      font-size: 1rem;
      font-weight: 700;
      font-style: italic;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .overlay-sub {
      font-size: 0.65rem;
      color: #333;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .overlay-close {
      background: none;
      border: none;
      color: #444;
      font-size: 1.3rem;
      cursor: pointer;
      font-family: inherit;
    }

    .overlay-close:hover { color: #fff; }

    .lb-list { list-style: none; }

    .lb-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 0;
      border-bottom: 1px solid #141414;
    }

    .lb-rank { font-size: 0.68rem; color: #333; width: 22px; text-align: right; flex-shrink: 0; }

    .lb-img-wrap {
      width: 56px;
      height: 56px;
      background: #638596;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lb-img { width: 100%; image-rendering: pixelated; }

    .lb-meta { flex: 1; }
    .lb-name { font-size: 0.82rem; font-weight: 600; letter-spacing: 0.04em; }
    .lb-count { font-size: 0.62rem; color: #444; margin-top: 3px; }

    .lb-bar-bg { width: 80px; height: 2px; background: #1a1a1a; flex-shrink: 0; }
    .lb-bar-fill { height: 100%; background: #DE4097; }

    .lb-empty { text-align: center; color: #2a2a2a; font-size: 0.78rem; padding: 64px 0; letter-spacing: 0.08em; text-transform: uppercase; }
    .lb-loading { text-align: center; color: #333; font-size: 0.72rem; padding: 48px 0; letter-spacing: 0.1em; text-transform: uppercase; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #DE4097;
      color: #fff;
      padding: 10px 24px;
      font-family: 'Chakra Petch', monospace;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      z-index: 300;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 700px) {
      .punk-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; }
      .main { padding: 20px 14px 40px; }
    }
    @media (max-width: 480px) {
      .punk-grid { grid-template-columns: repeat(4, 1fr); gap: 5px; }
      .main { padding: 16px 12px 36px; }
      /* Shrink leaderboard button to icon-only on tiny screens */
      .lb-trigger { padding: 8px 10px; font-size: 0.65rem; letter-spacing: 0; }
      .lb-trigger .lb-label { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">PunkPick</div>
  <div class="round-badge">Round <span id="roundNum">1</span></div>
  <button class="lb-trigger" id="lbBtn">🏆<span class="lb-label"> Leaderboard</span></button>
</header>

<main class="main">
  <div class="prompt">
    <h1>Pick Your Favorite Punk</h1>
    <p>Choose one · the community is watching</p>
  </div>
  <div class="punk-grid" id="punkGrid"></div>
  <div class="actions">
    <button class="btn-skip" id="skipBtn">Skip →</button>
    <button class="btn-next" id="btnNext">Lock It In →</button>
  </div>
</main>

<!-- Leaderboard -->
<div class="overlay" id="overlay">
  <div class="overlay-inner">
    <div class="overlay-hdr">
      <div>
        <div class="overlay-title">Most Liked Punks</div>
        <div class="overlay-sub">Community rankings · all votes combined</div>
      </div>
      <button class="overlay-close" id="closeBtn">✕</button>
    </div>
    <ul class="lb-list" id="lbList"></ul>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  var TOTAL = 10000;
  var PER_ROUND = 20;
  var API = '/api/likes';
  var round = 1;
  var selected = null;

  // wire up buttons via JS — no onclick in HTML
  document.getElementById('btnNext').addEventListener('click', function() { nextRound(true); });
  document.getElementById('skipBtn').addEventListener('click', function() { nextRound(false); });
  document.getElementById('lbBtn').addEventListener('click', openLeaderboard);
  document.getElementById('closeBtn').addEventListener('click', closeLeaderboard);

  function imgUrl(id) {
    var s = String(id);
    while (s.length < 4) s = '0' + s;
    return 'https://www.larvalabs.com/public/images/cryptopunks/punk' + s + '.png';
  }

  function randomPunks(n) {
    var s = [];
    var seen = {};
    while (s.length < n) {
      var r = Math.floor(Math.random() * TOTAL);
      if (!seen[r]) { seen[r] = true; s.push(r); }
    }
    return s;
  }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 1800);
  }

  function showLockBtn() {
    document.getElementById('btnNext').style.display = 'inline-block';
  }

  function hideLockBtn() {
    document.getElementById('btnNext').style.display = 'none';
  }

  function renderGrid() {
    selected = null;
    hideLockBtn();
    document.getElementById('roundNum').textContent = round;

    var ids = randomPunks(PER_ROUND);
    var grid = document.getElementById('punkGrid');
    grid.innerHTML = '';

    for (var i = 0; i < ids.length; i++) {
      (function(id) {
        var card = document.createElement('div');
        card.className = 'punk-card';

        var img = document.createElement('img');
        img.className = 'punk-img';
        img.src = imgUrl(id);
        img.alt = 'Punk #' + id;
        img.loading = 'lazy';

        var num = document.createElement('div');
        num.className = 'punk-num';
        num.textContent = '#' + id;

        card.appendChild(img);
        card.appendChild(num);

        card.addEventListener('click', function() { pick(id, card); });
        grid.appendChild(card);
      })(ids[i]);
    }
  }

  function pick(id, card) {
    var sid = String(id);

    // tap selected punk again → deselect
    if (selected === sid) {
      var all = document.querySelectorAll('.punk-card');
      for (var i = 0; i < all.length; i++) {
        all[i].classList.remove('selected', 'dimmed');
      }
      selected = null;
      hideLockBtn();
      return;
    }

    // select this punk
    var cards = document.querySelectorAll('.punk-card');
    for (var j = 0; j < cards.length; j++) {
      cards[j].classList.remove('selected', 'dimmed');
      if (cards[j] !== card) cards[j].classList.add('dimmed');
    }
    card.classList.add('selected');
    card.classList.remove('dimmed');
    selected = sid;
    showLockBtn();
  }

  function nextRound(save) {
    if (save && selected !== null) {
      submitLike(selected);
      showToast('Punk #' + selected + ' liked \u2764');
    }
    round++;
    renderGrid();
  }

  function submitLike(id) {
    // local save
    try {
      var local = JSON.parse(localStorage.getItem('pp_likes') || '{}');
      local[String(id)] = (local[String(id)] || 0) + 1;
      localStorage.setItem('pp_likes', JSON.stringify(local));
    } catch(e) {}

    // shared API
    fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: id })
    }).catch(function() {});
  }

  function fetchLikes(cb) {
    fetch(API)
      .then(function(r) { return r.json(); })
      .then(function(d) { cb(d.likes || {}); })
      .catch(function() {
        try { cb(JSON.parse(localStorage.getItem('pp_likes') || '{}')); }
        catch(e) { cb({}); }
      });
  }

  function openLeaderboard() {
    document.getElementById('overlay').classList.add('open');
    document.getElementById('lbList').innerHTML = '<div class="lb-loading">Loading community rankings...</div>';

    fetchLikes(function(likes) {
      var entries = [];
      for (var k in likes) { if (likes.hasOwnProperty(k)) entries.push([k, likes[k]]); }
      entries.sort(function(a, b) { return b[1] - a[1]; });
      entries = entries.slice(0, 25);

      var list = document.getElementById('lbList');
      if (!entries.length) {
        list.innerHTML = '<div class="lb-empty">No likes yet — start picking</div>';
        return;
      }

      var max = entries[0][1];
      var html = '';
      for (var i = 0; i < entries.length; i++) {
        var id = entries[i][0];
        var ct = entries[i][1];
        var pct = Math.round((ct / max) * 100);
        html += '<li class="lb-row">' +
          '<div class="lb-rank">' + (i+1) + '</div>' +
          '<div class="lb-img-wrap"><img class="lb-img" src="' + imgUrl(id) + '" alt="Punk #' + id + '"></div>' +
          '<div class="lb-meta">' +
            '<div class="lb-name">Punk #' + id + '</div>' +
            '<div class="lb-count">' + ct + ' like' + (ct !== 1 ? 's' : '') + '</div>' +
          '</div>' +
          '<div class="lb-bar-bg"><div class="lb-bar-fill" style="width:' + pct + '%"></div></div>' +
        '</li>';
      }
      list.innerHTML = html;
    });
  }

  function closeLeaderboard() {
    document.getElementById('overlay').classList.remove('open');
  }

  renderGrid();
</script>
</body>
</html>
